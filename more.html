<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="css/style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>More - KokoaTalk</title>
</head>
<body>
    <div class="status-bar">
        <div class="status-bar__column">
            <span>No Service</span>
            <i class="fa-solid fa-wifi"></i>
        </div>
        <div class="status-bar__column">
            <span>18:43</span>
        </div>
        <div class="status-bar__column">
            <span>72%</span>
            <i class="fa-solid fa-battery-three-quarters fa-lg"></i>
        </div>
    </div>

    <header class="screen-header">
        <h1 class="screen-header__title">More</h1>
        <div class="screen-header__icons">
            <span><i class="fa-solid fa-magnifying-glass fa-2x"></i></span>
            <span><i class="fa-solid fa-music fa-2x"></i></span>
            <span><i class="fa-solid fa-gear fa-2x"></i></span>
        </div>
    </header>

    <main class="main-screen">
        <div class="user-component">
            <div class="user-component__column">
                <img src="https://avatars.githubusercontent.com/u/121500548?v=4" class="user-component__avatar user-component__avatar--xl"/>
                <div class="user-component__text">
                    <h4 class="user-component__title">Rtals</h4>
                    <h6 class="user-component__subtitle">+82 010-1234-5678</h6>
                </div>
            </div>
            <div class="user-component__column">
                <i class="fa-regular fa-message fa-2x"></i>
            </div>
        </div>
        <div class="icon-row">
            <div class="icon-row__icon"><i class="fa-regular fa-calendar-check fa-2x"></i><span>Calendar</span></div>
            <div class="icon-row__icon"><i class="fa-regular fa-folder-open fa-2x"></i><span>Talk Drive</span></div>
            <div class="icon-row__icon"><i class="fa-regular fa-face-smile fa-2x"></i><span>Emoticons</span></div>
            <div class="icon-row__icon"><i class="fa-regular fa-bookmark fa-2x"></i><span>Themes</span></div>
        </div>
        <div class="icon-row">
            <div class="icon-row__icon"><i class="fa-regular fa-credit-card fa-2x"></i><span>Account</span></div>
            <div class="icon-row__icon"><i class="fa-regular fa-comments fa-2x"></i><span>Openchat</span></div>
            <div class="icon-row__none"><i class="fa-regular fa-comments fa-2x"></i><span>Openchat</span></div>
            <div class="icon-row__none"><i class="fa-regular fa-comments fa-2x"></i><span>Openchat</span></div>
        </div>
        <div class="more-suggestions">
            <h4 class="more-suggestions__title">Suggestions</h4>
            <div class="more-suggestions__icons">
                <div class="more-suggestions__icon">
                    <img src="images/kakao-page-logo.png" class="more-suggestions__icon-image"/>
                    <span class="more-suggestions__icon-name">Kokoa Story</span>
                </div>
                <div class="more-suggestions__icon">
                    <img src="images/kakao-map-logo.png" class="more-suggestions__icon-image"/>
                    <span class="more-suggestions__icon-name">Kokoa Map</span>
                </div>
                <div class="more-suggestions__icon">
                    <img src="images/kakao-bank-logo.png" class="more-suggestions__icon-image"/>
                    <span class="more-suggestions__icon-name">Kokoa Bank</span>
                </div>
                <div class="more-suggestions__icon-none">
                    <span>Kokoa Story</span>
                </div>
            </div>
        </div>
    </main>

    <nav class="nav">
        <ul class="nav__list">
            <li class="nav__btn">
                <a class="nav__link" href="friends.html"><i class="fa-regular fa-user fa-2x"></i></a>
            </li>
            <li class="nav__btn">
                <span class="badge nav__notification">1</span>
                <a class="nav__link" href="chats.html"><i class="fa-regular fa-comment fa-2x"></i></a>
            </li>
            <li class="nav__btn">
                <a class="nav__link" href="find.html"><i class="fa-solid fa-magnifying-glass fa-2x"></i></a>
            </li>
            <li class="nav__btn">
                <a class="nav__link" href="more.html"><i class="fa-solid fa-ellipsis fa-2x"></i></a>
            </li>
        </ul>
    </nav>

    <script src="https://kit.fontawesome.com/e27b19f7d4.js" crossorigin="anonymous"></script>
</body>
</html>
